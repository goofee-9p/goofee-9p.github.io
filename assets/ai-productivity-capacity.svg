  <g fill="none" stroke="#1a1714" stroke-width="3">
    <path d="M190 336 C290 314 360 276 452 246 C568 208 641 183 727 148 C813 113 905 94 990 82"/>
    <path d="M957 72 L990 82 L968 110"/>
    <circle cx="452" cy="246" r="7" fill="#fbfaf8"/>
    <circle cx="727" cy="148" r="7" fill="#fbfaf8"/>
  </g>
  <g fill="#57534c" font-family="'Noto Serif KR', 'Noto Sans KR', Arial, sans-serif" font-size="18" font-weight="600">
    <text x="150" y="638">반복 처리 시간은 줄어들고</text>
    <text x="642" y="638">시스템으로 더 큰 일을 감당한다</text>

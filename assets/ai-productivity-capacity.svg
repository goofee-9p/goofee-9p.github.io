  <rect width="1200" height="720" fill="#fbfaf8"/>
  <g fill="none" stroke="#1a1714" stroke-width="3">
    <rect x="120" y="116" width="960" height="488"/>
    <line x1="120" y1="470" x2="1080" y2="470"/>
    <line x1="290" y1="116" x2="290" y2="604"/>
    <line x1="548" y1="116" x2="548" y2="604"/>
    <line x1="806" y1="116" x2="806" y2="604"/>
  </g>
  <g fill="#1a1714" font-family="'Noto Serif KR', 'Noto Sans KR', Arial, sans-serif" font-size="25" font-weight="700">
    <text x="120" y="78">생산성 기준선</text>
    <text x="163" y="542">이전</text>
    <text x="403" y="542">AI 활용</text>
    <text x="661" y="542">재설계</text>
    <text x="913" y="542">업무 총량</text>
  </g>
  <g fill="#1a1714">
    <rect x="166" y="374" width="76" height="96"/>
